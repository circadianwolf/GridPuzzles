<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title>Grid Puzzles</title>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-width: 100vw;
            margin: 0;
            background: #f0f0f0;
        }

        main {
            width: 450px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            margin-left:25px;
        }

        .puzzleListItem.active {
            font-weight: bold;
        }

        #instructions {
            padding-bottom: 15px;
        }

        #gridCanvas {
            background: white;
        }

        #progressAndReset {
            width: 100%;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            padding: 0px 50px 15px;
            box-sizing: border-box;
        }

        #progress {
            width: 100%;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
        }

        #progress > grid-progress {
            order: -1;
        }

        #btnReset {
            height:25px;
        }
    </style>
</head>
<body>
    <nav>
        <ul id="puzzleList">

        </ul>
    </nav>
    <main>
        <h1 id="puzzleTitle"></h1>
        <div id="instructions">
        </div>
        <h2 id="hSuccess" hidden>Success!</h2>
        <div id="progressAndReset">
            <div id="progress">

            </div>
            <button type="button" id="btnReset">Reset</button>
        </div>
        <canvas id="gridCanvas" width="450" height="450"></canvas>
    </main>
    <script type="text/javascript" src="IterableWeakMap.js"></script>
    <script type="text/javascript" src="EventManager.js"></script>
    <script type="text/javascript" src="GridProgressElement.js"></script>
    <script type="text/javascript" src="GridBase.js"></script>
    <script type="text/javascript" src="GridPuzzle.js"></script>
    <script type="text/javascript" src="GridPuzzleCollection.js"></script>
    <script type="text/javascript" src="Puzzles/LaserMirrorGrid.js"></script>
    <script type="text/javascript" src="Puzzles/HitoriGrid.js"></script>
    <script>
        customElements.define("grid-progress", GridProgressElement);

        const puzzleCollection = new GridPuzzleCollection("puzzleList", "puzzleTitle", "instructions", "progress", "hSuccess", "btnReset", "gridCanvas", 50, 50, [
            LaserMirrorGrid.GetPuzzle(),
            HitoriGrid.GetPuzzle(),
        ]);

        puzzleCollection.ChangePuzzle('LaserMirrorGrid');
    </script>
</body>
</html>
